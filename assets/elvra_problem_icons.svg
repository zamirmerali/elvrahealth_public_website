<svg width="720" height="250" viewBox="0 0 720 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <pattern id="dotgrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="rgba(0,0,0,0.05)"/>
    </pattern>
    <style>
      .icon-card { fill: #fff8d6; stroke: #e6b800; stroke-width: 1.5; }
      .caption { font-family: sans-serif; font-size: 13px; font-weight: 500; fill: #2c2c2a; }
      .subcap { font-family: sans-serif; font-size: 11px; fill: #5f5e5a; }
      @keyframes wiggle { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
      @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
      .paper-droop { transform-origin: 114px 103px; animation: wiggle 3s ease-in-out infinite; }
      .magnifier { transform-origin: 392px 113px; animation: float 2.5s ease-in-out infinite; }
      .alert { transform-origin: 666px 113px; animation: bounce 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="720" height="250" fill="#FFD708"/>
  <rect width="720" height="250" fill="url(#dotgrid)"/>

  <!-- Card 1: The 28 Page Fax — 0.8x scale, 80px gaps -->
  <g transform="translate(40,25) scale(0.8) translate(-20,-20)">
    <rect class="icon-card" x="20" y="20" width="200" height="280" rx="16"/>
    <rect x="55" y="52" width="130" height="70" rx="8" fill="#4A90D9" stroke="#2c6fad" stroke-width="1.5"/>
    <rect x="65" y="60" width="60" height="18" rx="3" fill="#A8D8EA" opacity="0.9"/>
    <circle cx="148" cy="65" r="5" fill="#F0C040"/>
    <circle cx="163" cy="65" r="5" fill="#E05050"/>
    <circle cx="148" cy="80" r="5" fill="#60C060"/>
    <circle cx="163" cy="80" r="5" fill="#F0C040"/>
    <rect x="60" y="108" width="120" height="10" rx="3" fill="#2c6fad"/>
    <g class="paper-droop">
      <rect x="93" y="118" width="54" height="12" rx="2" fill="white" stroke="#ccc" stroke-width="0.8"/>
      <rect x="93" y="130" width="54" height="12" rx="2" fill="#f9f9f9" stroke="#ccc" stroke-width="0.8"/>
      <rect x="93" y="142" width="54" height="12" rx="2" fill="white" stroke="#ccc" stroke-width="0.8"/>
      <rect x="93" y="154" width="54" height="12" rx="2" fill="#f9f9f9" stroke="#ccc" stroke-width="0.8"/>
      <rect x="93" y="166" width="54" height="12" rx="2" fill="white" stroke="#ccc" stroke-width="0.8"/>
      <rect x="93" y="178" width="54" height="12" rx="2" fill="#f9f9f9" stroke="#ccc" stroke-width="0.8"/>
      <path d="M93 190 Q80 210 93 220 Q106 230 120 235" fill="none" stroke="white" stroke-width="14" stroke-linecap="round"/>
      <path d="M147 190 Q160 210 147 220 Q134 230 120 235" fill="none" stroke="#f0f0f0" stroke-width="10" stroke-linecap="round"/>
      <path d="M93 190 Q80 210 93 220 Q106 230 120 235" fill="none" stroke="#ccc" stroke-width="1"/>
      <path d="M147 190 Q160 210 147 220 Q134 230 120 235" fill="none" stroke="#ccc" stroke-width="1"/>
      <line x1="99" y1="123" x2="137" y2="123" stroke="#bbb" stroke-width="1"/>
      <line x1="99" y1="135" x2="137" y2="135" stroke="#bbb" stroke-width="1"/>
      <line x1="99" y1="147" x2="137" y2="147" stroke="#bbb" stroke-width="1"/>
      <line x1="99" y1="159" x2="137" y2="159" stroke="#bbb" stroke-width="1"/>
      <line x1="99" y1="171" x2="137" y2="171" stroke="#bbb" stroke-width="1"/>
      <line x1="99" y1="183" x2="137" y2="183" stroke="#bbb" stroke-width="1"/>
      <ellipse cx="162" cy="140" rx="5" ry="7" fill="#A8D8EA" opacity="0.8"/>
      <ellipse cx="170" cy="155" rx="4" ry="6" fill="#A8D8EA" opacity="0.6"/>
      <rect x="140" y="55" rx="10" ry="10" width="36" height="22" fill="#E05050"/>
      <text x="158" y="70" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="13" fill="white">28!</text>
    </g>
    <text class="caption" x="120" y="258" text-anchor="middle">The 28 Page Fax</text>
    <text class="subcap" x="120" y="275" text-anchor="middle">paperwork overload</text>
  </g>

  <!-- Card 2: The Missing Investigation — 0.8x scale, 80px gap -->
  <g transform="translate(280,25) scale(0.8) translate(-240,-20)">
    <rect class="icon-card" x="240" y="20" width="200" height="280" rx="16"/>
    <g class="magnifier">
      <rect x="300" y="90" width="70" height="85" rx="6" fill="#F5D98A" stroke="#c8a428" stroke-width="1.2"/>
      <rect x="296" y="96" width="70" height="85" rx="6" fill="#FAE8A0" stroke="#c8a428" stroke-width="1.2"/>
      <rect x="292" y="102" width="70" height="85" rx="6" fill="white" stroke="#c8a428" stroke-width="1.2"/>
      <line x1="302" y1="116" x2="352" y2="116" stroke="#ddd" stroke-width="1.5"/>
      <line x1="302" y1="125" x2="352" y2="125" stroke="#ddd" stroke-width="1.5"/>
      <line x1="302" y1="134" x2="338" y2="134" stroke="#ddd" stroke-width="1.5"/>
      <line x1="302" y1="143" x2="345" y2="143" stroke="#ddd" stroke-width="1.5"/>
      <text x="327" y="175" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="32" fill="#E07830" opacity="0.8">?</text>
      <circle cx="382" cy="108" r="30" fill="none" stroke="#5A5AE0" stroke-width="4"/>
      <circle cx="382" cy="108" r="30" fill="#A8C8FF" opacity="0.25"/>
      <path d="M370 95 Q374 90 382 90" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
      <line x1="404" y1="130" x2="422" y2="150" stroke="#5A5AE0" stroke-width="5" stroke-linecap="round"/>
      <text x="268" y="100" font-size="14" font-family="sans-serif" fill="#F0C040">✦</text>
      <text x="415" y="90" font-size="10" font-family="sans-serif" fill="#F0C040">✦</text>
      <text x="270" y="175" font-size="10" font-family="sans-serif" fill="#F0C040">✦</text>
    </g>
    <text class="caption" x="340" y="258" text-anchor="middle">The Missing Investigation</text>
    <text class="subcap" x="340" y="275" text-anchor="middle">lost in the system</text>
  </g>

  <!-- Card 3: The Buried Emergency — 0.8x scale, 80px gap -->
  <g transform="translate(520,25) scale(0.8) translate(-460,-20)">
    <rect class="icon-card" x="460" y="20" width="200" height="280" rx="16"/>
    <g class="alert">
      <rect x="490" y="165" width="120" height="18" rx="4" fill="#D3D1C7" stroke="#b0aea5" stroke-width="0.8" transform="rotate(-5, 550, 174)"/>
      <rect x="488" y="148" width="120" height="18" rx="4" fill="#E8E5DC" stroke="#b0aea5" stroke-width="0.8" transform="rotate(3, 548, 157)"/>
      <rect x="492" y="132" width="120" height="18" rx="4" fill="#D3D1C7" stroke="#b0aea5" stroke-width="0.8" transform="rotate(-2, 552, 141)"/>
      <rect x="487" y="116" width="120" height="18" rx="4" fill="#E8E5DC" stroke="#b0aea5" stroke-width="0.8" transform="rotate(4, 547, 125)"/>
      <rect x="491" y="100" width="120" height="18" rx="4" fill="#F1EFE8" stroke="#b0aea5" stroke-width="0.8" transform="rotate(-3, 551, 109)"/>
      <polygon points="550,68 595,148 505,148" fill="#E85028" stroke="#bf3a18" stroke-width="2"/>
      <rect x="546" y="88" width="8" height="34" rx="3" fill="white"/>
      <circle cx="550" cy="135" r="5" fill="white"/>
      <rect x="488" y="100" width="120" height="20" rx="4" fill="#F1EFE8" stroke="#b0aea5" stroke-width="0.8" transform="rotate(-3, 548, 110)"/>
      <rect x="491" y="116" width="120" height="18" rx="4" fill="#E8E5DC" stroke="#b0aea5" stroke-width="0.8" transform="rotate(4, 551, 125)"/>
      <rect x="487" y="132" width="120" height="18" rx="4" fill="#F1EFE8" stroke="#b0aea5" stroke-width="0.8" transform="rotate(-2, 547, 141)"/>
      <rect x="490" y="148" width="120" height="18" rx="4" fill="#E8E5DC" stroke="#b0aea5" stroke-width="0.8" transform="rotate(3, 550, 157)"/>
      <rect x="486" y="164" width="124" height="18" rx="4" fill="#D3D1C7" stroke="#b0aea5" stroke-width="0.8" transform="rotate(-4, 548, 173)"/>
      <rect x="489" y="180" width="124" height="18" rx="4" fill="#E8E5DC" stroke="#b0aea5" stroke-width="0.8" transform="rotate(2, 551, 189)"/>
      <polygon points="550,185 565,208 535,208" fill="#E85028" opacity="0.85"/>
      <path d="M476 130 L468 124 L476 118 L468 112" fill="none" stroke="#E85028" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <path d="M624 130 L632 124 L624 118 L632 112" fill="none" stroke="#E85028" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    </g>
    <text class="caption" x="560" y="258" text-anchor="middle">The Buried Emergency</text>
    <text class="subcap" x="560" y="275" text-anchor="middle">hidden under the pile</text>
  </g>
</svg>
